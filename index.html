<!DOCTYPE html>
<html lang="en">
<head>

<title>Vogue Layout</title>

<style>
body {
    margin: 0;

    background: #f5f5f5;
}

    width: 90%;
    margin: auto;

}

h1 {
    font-size: 40px;

    font-size: 18px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>

<div class="container">

<h1>VOGUE MAGAZINE</h1>

</html>
