<script>
// ===============================
// DEVICE CHECK (disable heavy effects on mobile)
// ===============================
const isMobile = window.matchMedia("(max-width: 768px)").matches;

// ===============================
// SAFE CURSOR (DESKTOP ONLY)
// ===============================
if (!isMobile) {
    const cursor = document.getElementById('lazyCursor');
    const dot = document.getElementById('cursorDot');

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = mouseX + 'px';
        dot.style.top = mouseY + 'px';
    });

    function animateCursor() {
        cursorX += (mouseX - cursorX) * 0.1;
        cursorY += (mouseY - cursorY) * 0.1;

        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';

        requestAnimationFrame(animateCursor);
    }
    animateCursor();
}

// ===============================
// IMAGE LAZY LOAD SAFETY
// ===============================
document.querySelectorAll("img").forEach(img => {
    img.setAttribute("loading", "lazy");
});

// ===============================
// REVEAL ON SCROLL (SAFE)
// ===============================
const reveals = document.querySelectorAll('.reveal-block');

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
        }
    });
}, { threshold: 0.2 });

reveals.forEach(el => observer.observe(el));

// ===============================
// THROTTLED SCROLL EFFECT
// ===============================
let ticking = false;

window.addEventListener('scroll', () => {
    if (!ticking) {
        requestAnimationFrame(() => {
            const heroImg = document.querySelector('.hero-video-bg');

            if (heroImg) {
                let scrolled = window.scrollY;
                heroImg.style.transform = `scale(${1 + scrolled * 0.0002})`;
            }

            ticking = false;
        });
        ticking = true;
    }
});

// ===============================
// FORM VALIDATION (REAL FIX)
// ===============================
const form = document.getElementById('reservationForm');
const successMsg = document.getElementById('formSuccessMsg');
const notif = document.getElementById('reserveNotification');

function validEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

form.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const checkin = document.getElementById('checkin').value;
    const checkout = document.getElementById('checkout').value;
    const room = document.getElementById('roomSelect').value;

    if (!name || !email || !checkin || !checkout || !room) {
        alert("Please fill in all fields.");
        return;
    }

    if (!validEmail(email)) {
        alert("Enter a valid email address.");
        return;
    }

    if (new Date(checkout) <= new Date(checkin)) {
        alert("Checkout must be after check-in.");
        return;
    }

    // Fake success (ready for backend later)
    successMsg.style.display = 'block';
    notif.classList.add('show');

    setTimeout(() => {
        notif.classList.remove('show');
        successMsg.style.display = 'none';
    }, 4000);

    form.reset();
});

// ===============================
// NAVIGATION FIX
// ===============================
document.getElementById('navReserveTrigger').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('booking').scrollIntoView({
        behavior: 'smooth'
    });
});

// ===============================
// STAR ANIMATION (OPTIMIZED)
// ===============================
if (!isMobile) {
    const canvas = document.getElementById('starsCanvas');
    if (canvas) {
        const ctx = canvas.getContext('2d');

        let stars = [];
        let width, height;

        function resize() {
            width = canvas.parentElement.offsetWidth;
            height = canvas.parentElement.offsetHeight;
            canvas.width = width;
            canvas.height = height;

            stars = Array.from({ length: 80 }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.5,
                a: Math.random()
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.a})`;
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    }
}
</script>
