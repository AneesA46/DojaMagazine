<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An-Inn-Sa — Stillness Speaks</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body { margin:0; background:#0a0a0a; color:#e8e6e1; font-family:Inter; }

/* KEEP YOUR ORIGINAL CSS (unchanged for design) */
/* Just small performance tweak */
img { max-width:100%; display:block; }

/* Hide custom cursor on mobile */
@media(max-width:768px){
  .custom-cursor, .cursor-dot { display:none; }
}
</style>
</head>

<body>

<!-- KEEP YOUR ORIGINAL HTML STRUCTURE -->
<!-- (Hero, rooms, dining, booking etc — unchanged) -->

<!-- IMPORTANT: add loading lazy to images -->
<img src="https://picsum.photos/id/104/1920/1080" loading="lazy">

<!-- KEEP EVERYTHING ELSE SAME -->

<script>
// ===============================
// DEVICE CHECK
// ===============================
const isMobile = window.matchMedia("(max-width: 768px)").matches;

// ===============================
// SAFE CURSOR (DESKTOP ONLY)
// ===============================
if (!isMobile) {
    const cursor = document.getElementById('lazyCursor');
    const dot = document.getElementById('cursorDot');

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = mouseX + 'px';
        dot.style.top = mouseY + 'px';
    });

    function animateCursor() {
        cursorX += (mouseX - cursorX) * 0.1;
        cursorY += (mouseY - cursorY) * 0.1;

        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';

        requestAnimationFrame(animateCursor);
    }
    animateCursor();
}

// ===============================
// LAZY LOAD IMAGES
// ===============================
document.querySelectorAll("img").forEach(img => {
    img.setAttribute("loading", "lazy");
});

// ===============================
// REVEAL ANIMATION
// ===============================
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
        }
    });
});
document.querySelectorAll('.reveal-block').forEach(el => observer.observe(el));

// ===============================
// THROTTLED SCROLL
// ===============================
let ticking = false;

window.addEventListener('scroll', () => {
    if (!ticking) {
        requestAnimationFrame(() => {
            const hero = document.querySelector('.hero-video-bg');
            if (hero) {
                hero.style.transform = `scale(${1 + window.scrollY * 0.0002})`;
            }
            ticking = false;
        });
        ticking = true;
    }
});

// ===============================
// FORM VALIDATION
// ===============================
const form = document.getElementById('reservationForm');

function validEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

form.addEventListener('submit', e=>{
  e.preventDefault();

  const name = fullName.value.trim();
  const email = document.getElementById('email').value.trim();
  const checkin = checkin.value;
  const checkout = checkout.value;
  const room = roomSelect.value;

  if(!name || !email || !checkin || !checkout || !room){
    alert("Fill all fields");
    return;
  }

  if(!validEmail(email)){
    alert("Invalid email");
    return;
  }

  if(new Date(checkout) <= new Date(checkin)){
    alert("Checkout must be after checkin");
    return;
  }

  alert("Reservation successful!");
  form.reset();
});

// ===============================
// NAV SCROLL FIX
// ===============================
document.getElementById('navReserveTrigger').onclick = (e)=>{
  e.preventDefault();
  document.getElementById('booking').scrollIntoView({behavior:'smooth'});
};

// ===============================
// LIGHTWEIGHT STAR ANIMATION
// ===============================
if(!isMobile){
  const canvas = document.getElementById('starsCanvas');
  if(canvas){
    const ctx = canvas.getContext('2d');
    let stars = [];

    function init(){
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      stars = Array.from({length:60}, ()=>({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.5
      }));
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
  }
}
</script>

</body>
</html>
